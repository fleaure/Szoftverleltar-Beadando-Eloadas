<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Web programozás-1 - OOJS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ez a rész felel a sötét dobozért */
        #monitor-space {
            position: relative;
            width: 100%;
            height: 350px;
            display: flex; /* Középre rendezéshez */
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            border: 2px solid #333;
            border-radius: 15px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        
        /* Terminál görgetősáv */
        #oojs-main ::-webkit-scrollbar { width: 3px; }
        #oojs-main ::-webkit-scrollbar-thumb { background: #00ff00; }
    </style>
</head>
<body class="bg-dark text-white">

    <header style="padding: 40px 20px !important; text-align: center !important; display: block !important; background-color: var(--medium-blue) !important;">
        <h1 style="font-size: 2.2rem !important; margin: 0 !important; color: var(--text-color) !important; font-weight: bold !important;">
            Web programozás-1 Előadás Házi feladat
        </h1>
    </header>

    <nav>
        <a href="index.html">Főoldal</a>
        <a href="javascript.html">JavaScript</a>
        <a href="react.html">React</a>
        <a href="spa.html">SPA</a>
        <a href="fetchapi.html">Fetch API</a>
        <a href="axios.html">Axios</a>
        <a href="oojs.html" class="active">OOJS</a>
    </nav>

    <main id="oojs-main" class="container mt-4 pb-5">
        <h2>Objektumorientált Szoftverleltár</h2>
        
        <div id="monitor-space">
            <div id="placeholder" class="text-secondary">Válasszon egy gépet a listából!</div>
        </div>

        <div class="card bg-dark border-secondary p-4 shadow">
            <div class="row align-items-end g-3">
                <div class="col-md-6">
                    <label class="form-label text-info">Gép kiválasztása:</label>
                    <select id="gepValaszto" class="form-select bg-dark text-white border-secondary">
                        <option value="">-- Adatok betöltése... --</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" onclick="megjelenitGep()">Létrehozás</button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-danger w-100" onclick="torolMonitor()">Törlés</button>
                </div>
            </div>
        </div>
    </main>

      <footer>
        <p>Készítette: 
            <span class="neptun-info">Matiszné Tóth Brigitta ([H0E8QF])</span> és 
            <span class="neptun-info">Kovács Dániel ([Z2IGLN])</span>
        </p>
    </footer>

    <script src="oojs_script.js"></script>
    <script>
        let nyersGepek = [];
        let nyersTelepitesek = [];
        let szoftverNevek = {};
        let aktualisObjektum = null;

        async function initData() {
            try {
                const [gepRes, telRes, szoftRes] = await Promise.all([
                    fetch('api.php?t=gep'),
                    fetch('api.php?table=telepites&limit=500'),
                    fetch('api.php?table=szoftver')
                ]);

                const gepData = await gepRes.json();
                const telData = await telRes.json();
                const szoftData = await szoftRes.json();

                // Itt a .readData kulcsokat használjuk, mert az api.php így küldi
                nyersGepek = gepData.readData || [];
                nyersTelepitesek = telData.readData || [];
                if (szoftData.readData) {
                    szoftData.readData.forEach(s => { szoftverNevek[s.id] = s.nev; });
                }

                const select = document.getElementById('gepValaszto');
                select.innerHTML = '<option value="">-- Válasszon egy gépet --</option>';
                nyersGepek.forEach(gep => {
                    let opt = document.createElement('option');
                    opt.value = gep.id;
                    opt.innerText = `ID: ${gep.id} (Hely: ${gep.hely})`;
                    select.appendChild(opt);
                });
                document.getElementById('placeholder').innerText = "Válasszon a listából!";
            } catch (error) { console.error(error); }
        }

        function torolMonitor() {
            document.getElementById('monitor-space').innerHTML = '<div id="placeholder" class="text-secondary">Objektum törölve.</div>';
            aktualisObjektum = null;
        }

        function megjelenitGep() {
            const id = document.getElementById('gepValaszto').value;
            if (!id) return;

            const gepAdat = nyersGepek.find(g => g.id == id);
            torolMonitor();
            document.getElementById('monitor-space').innerHTML = "";

            // 1. ÚJ PÉLDÁNY LÉTREHOZÁSA (OOJS)
            aktualisObjektum = new Szamitogep(gepAdat.id, gepAdat.hely, 0, 0);
            
            // 2. JAVÍTÁS: Kényszerítjük, hogy a Flexbox középre tegye (ne legyen absolute)
            aktualisObjektum.element.style.position = "relative";
            aktualisObjektum.element.style.left = "auto";
            aktualisObjektum.element.style.top = "auto";

            // 3. Szoftverek betöltése
            nyersTelepitesek.forEach(t => {
                if (t.gepid == id) {
                    let nev = szoftverNevek[t.szoftverid] || `ID: ${t.szoftverid}`;
                    aktualisObjektum.addSzoftver(nev, t.verzio);
                }
            });

            aktualisObjektum.highlight();
        }

        initData();
    </script>
</body>
</html>
